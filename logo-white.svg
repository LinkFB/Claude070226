<svg viewBox="0 0 600 180" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Link Fort Bend</title>
<desc>Network mark of a central hub connected to five satellite nodes, beside the LINK FORT BEND wordmark and an AN INDIVISIBLE GROUP subtitle, in light colors for use on a dark background.</desc>
<line x1="80" y1="85" x2="80" y2="43" stroke="#6CA1C5" stroke-width="2"/>
<line x1="80" y1="85" x2="120" y2="72" stroke="#CE4947" stroke-width="2"/>
<line x1="80" y1="85" x2="105" y2="120" stroke="#EBE2D7" stroke-width="2"/>
<line x1="80" y1="85" x2="55" y2="120" stroke="#CE4947" stroke-width="2"/>
<line x1="80" y1="85" x2="40" y2="72" stroke="#EBE2D7" stroke-width="2"/>
<circle cx="80" cy="85" r="9" fill="#6CA1C5"/>
<circle cx="80" cy="43" r="5.5" fill="#6CA1C5"/>
<circle cx="120" cy="72" r="5.5" fill="#CE4947"/>
<circle cx="105" cy="120" r="5.5" fill="#EBE2D7"/>
<circle cx="55" cy="120" r="5.5" fill="#CE4947"/>
<circle cx="40" cy="72" r="5.5" fill="#EBE2D7"/>
<text x="142" y="88" font-family="Archivo, Arial, sans-serif" font-weight="900" font-size="42" letter-spacing="-1" fill="#FFFFFF">LINK FORT BEND</text>
<text x="143" y="112" font-family="'JetBrains Mono', monospace" font-weight="500" font-size="14" letter-spacing="2" fill="#CE4947">AN INDIVISIBLE GROUP</text>
</svg>
